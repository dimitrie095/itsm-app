services:
  itsm-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:D090799t@postgres:5432/itsm?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-in-production}
      # Optional: Uncomment to use PostgreSQL instead of SQLite
      # - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/itsm_db
    volumes:
      - itsm-data:/app/.data
      # For development, mount the source code (optional)
      # - .:/app
      # - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm start"
    restart: unless-stopped
    # Uncomment to seed database on first run
    # command: sh -c "npx prisma migrate deploy && npm run seed && npm start"
  
  # PostgreSQL database (optional)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itsm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: D090799t
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  itsm-data:
  postgres-data: